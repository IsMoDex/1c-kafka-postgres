name: Publish Images

on:
  workflow_run:
    workflows: [CI]
    branches: [main]
    types: [completed]

permissions:
  contents: read
  packages: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: true

jobs:
  publish:
    name: Publish ${{ matrix.service }}
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_repository.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: integration-service
            image: ghcr.io/ismodex/1c-kafka-postgres-integration-service
          - service: consumer-service
            image: ghcr.io/ismodex/1c-kafka-postgres-consumer-service
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Verify this is the current main commit
        shell: bash
        env:
          EXPECTED_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          git fetch --no-tags origin main
          test "$(git rev-parse origin/main)" = "$EXPECTED_SHA"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ${{ matrix.image }}
          tags: |
            type=raw,value=sha-${{ github.event.workflow_run.head_sha }}
            type=raw,value=latest

      - name: Build and publish production image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: ./${{ matrix.service }}
          target: prod
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service }}-prod
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}-prod
          provenance: true
          sbom: true
