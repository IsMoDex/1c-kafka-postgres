name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality (${{ matrix.service }})
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        service: [integration-service, consumer-service]
    defaults:
      run:
        working-directory: ${{ matrix.service }}
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: "0.11.17"
          enable-cache: true

      - name: Install locked dependencies
        run: uv sync --locked

      - name: Check formatting
        run: uv run ruff format --check .

      - name: Lint
        run: uv run ruff check --output-format=github .

      - name: Type check
        run: uv run ty check

  unit-tests:
    name: Unit tests (${{ matrix.service }})
    needs: quality
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: integration-service
            command: python -m pytest -q -m "not integration"
          - service: consumer-service
            command: python -m pytest -q -m "not postgres"
    defaults:
      run:
        working-directory: ${{ matrix.service }}
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: "0.11.17"
          enable-cache: true

      - name: Install locked dependencies
        run: uv sync --locked

      - name: Run tests
        run: uv run ${{ matrix.command }}

  postgres-integration:
    name: PostgreSQL integration
    needs: quality
    runs-on: ubuntu-latest
    timeout-minutes: 10
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: integration
          POSTGRES_PASSWORD: integration
          POSTGRES_DB: integration_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U integration -d integration_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      TEST_PG_DSN: postgresql://integration:integration@localhost:5432/integration_test
    defaults:
      run:
        working-directory: consumer-service
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: "0.11.17"
          enable-cache: true

      - name: Install locked dependencies
        run: uv sync --locked

      - name: Apply database schema
        run: >-
          uv run python -c
          "import os,pathlib,psycopg;
          c=psycopg.connect(os.environ['TEST_PG_DSN']);
          c.execute(pathlib.Path('../migrations/V1__init.sql').read_text(encoding='utf-8'));
          c.commit();c.close()"

      - name: Run PostgreSQL integration tests
        run: uv run pytest -q -m postgres

  dependency-audit:
    name: Dependency audit (${{ matrix.service }})
    needs: quality
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        service: [integration-service, consumer-service]
    defaults:
      run:
        working-directory: ${{ matrix.service }}
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: "0.11.17"
          enable-cache: true

      - name: Export locked production dependencies
        run: uv export --frozen --no-dev --no-emit-project --format requirements-txt -o requirements-audit.txt

      - name: Audit known vulnerabilities
        run: uvx --from pip-audit==2.9.0 pip-audit -r requirements-audit.txt

  secret-scan:
    name: Secret scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out complete history
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0

      - name: Scan Git history
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  codeql:
    name: CodeQL
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@02c5e83432fe5497fd85b873b6c9f16a8578e1d9 # v3
        with:
          languages: python

      - name: Analyze
        uses: github/codeql-action/analyze@02c5e83432fe5497fd85b873b6c9f16a8578e1d9 # v3

  production-images:
    name: Production image (${{ matrix.service }})
    needs: quality
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        service: [integration-service, consumer-service]
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Build production target
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: ./${{ matrix.service }}
          target: prod
          push: false
          load: true
          tags: local/${{ matrix.service }}:ci
          cache-from: type=gha,scope=${{ matrix.service }}-prod
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}-prod

      - name: Scan production image
        run: >-
          docker run --rm
          -v /var/run/docker.sock:/var/run/docker.sock
          -v trivy-cache-${{ matrix.service }}:/root/.cache
          aquasec/trivy@sha256:6fb0646988fcd2fdf7bf123f7174945ebc2c9c72d1fa1567c8d7daeeb70f8037
          image --scanners vuln --skip-version-check --exit-code 1 --ignore-unfixed
          --severity HIGH,CRITICAL local/${{ matrix.service }}:ci

  compose-integration:
    name: Compose integration
    needs: [unit-tests, postgres-integration, dependency-audit, production-images]
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      SOURCE_TYPE: mock
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Validate Compose configuration
        run: docker compose config --quiet

      - name: Build and start the integration stack
        run: docker compose up -d --build

      - name: Run end-to-end smoke test
        run: bash scripts/ci-integration.sh

      - name: Show service logs on failure
        if: failure()
        run: docker compose logs --no-color

      - name: Stop the integration stack
        if: always()
        run: docker compose down -v --remove-orphans
