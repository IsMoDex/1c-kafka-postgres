name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit-tests:
    name: Unit tests (${{ matrix.service }})
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: integration-service
            command: python -m pytest -q -m "not integration"
          - service: consumer-service
            command: python -m pytest -q
    defaults:
      run:
        working-directory: ${{ matrix.service }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: ${{ matrix.service }}/pyproject.toml

      - name: Install service with test dependencies
        run: python -m pip install ".[test]"

      - name: Run tests
        run: ${{ matrix.command }}

  compose-integration:
    name: Compose integration
    needs: unit-tests
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      SOURCE_TYPE: mock
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate Compose configuration
        run: docker compose config --quiet

      - name: Build and start the integration stack
        run: docker compose up -d --build

      - name: Run end-to-end smoke test
        run: bash scripts/ci-integration.sh

      - name: Show service logs on failure
        if: failure()
        run: docker compose logs --no-color

      - name: Stop the integration stack
        if: always()
        run: docker compose down -v --remove-orphans
