name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality (${{ matrix.service }})
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        service: [integration-service, consumer-service]
    defaults:
      run:
        working-directory: ${{ matrix.service }}
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.17"
          enable-cache: true

      - name: Install locked dependencies
        run: uv sync --locked

      - name: Check formatting
        run: uv run ruff format --check .

      - name: Lint
        run: uv run ruff check --output-format=github .

      - name: Type check
        run: uv run ty check

  unit-tests:
    name: Unit tests (${{ matrix.service }})
    needs: quality
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: integration-service
            command: python -m pytest -q -m "not integration"
          - service: consumer-service
            command: python -m pytest -q
    defaults:
      run:
        working-directory: ${{ matrix.service }}
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.17"
          enable-cache: true

      - name: Install locked dependencies
        run: uv sync --locked

      - name: Run tests
        run: uv run ${{ matrix.command }}

  production-images:
    name: Production image (${{ matrix.service }})
    needs: quality
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        service: [integration-service, consumer-service]
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Build production target
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: ./${{ matrix.service }}
          target: prod
          push: false
          cache-from: type=gha,scope=${{ matrix.service }}-prod
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}-prod

  compose-integration:
    name: Compose integration
    needs: [unit-tests, production-images]
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      SOURCE_TYPE: mock
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Validate Compose configuration
        run: docker compose config --quiet

      - name: Build and start the integration stack
        run: docker compose up -d --build

      - name: Run end-to-end smoke test
        run: bash scripts/ci-integration.sh

      - name: Show service logs on failure
        if: failure()
        run: docker compose logs --no-color

      - name: Stop the integration stack
        if: always()
        run: docker compose down -v --remove-orphans
